version: "3.9"

services:
  api:
    build: .
    container_name: narrative-synth-api
    env_file:
      - .env
    ports:
      - "8002:8000"
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    environment:
      - PYTHONPATH=/app
      - DATABASE_URL=sqlite:////app/data/research.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build: ./frontend
    container_name: narrative-synth-frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped
